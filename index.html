<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idle Garage Tycoon</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
            overflow: hidden;
        }

        .game-container {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            width: 900px;
            height: 550px;
            background-color: #2d2d2d;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid #404040;
        }

        /* Left Side: Animation & Main Clicker */
        .click-section {
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            border-right: 1px solid #404040;
            background: linear-gradient(180deg, #222 0%, #111 100%);
            position: relative;
        }

        .stats-display {
            text-align: center;
            z-index: 2;
        }

        .stats-display h1 {
            font-size: 2.8rem;
            margin: 0 0 5px 0;
            color: #2ecc71;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .stats-display p {
            margin: 4px 0;
            color: #a0a0a0;
            font-size: 1rem;
        }

        /* Road & Driving Animation Canvas */
        .stage {
            width: 100%;
            height: 180px;
            background-color: #333;
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            border: 2px solid #444;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        /* Sky/Background of the stage */
        .sky {
            height: 50%;
            background: linear-gradient(to bottom, #111 0%, #222 100%);
            border-bottom: 4px solid #1e824c; /* Grass line */
        }

        /* Endless moving road */
        .road {
            height: 50%;
            background-color: #3a3a3a;
            position: relative;
        }

        .road::before {
            content: "";
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 200%;
            height: 6px;
            background: linear-gradient(to right, #fff 0%, #fff 50%, text-align 50%, transparent 100%);
            background-size: 60px 100%;
            animation: drive-loop 0.5s linear infinite;
        }

        @keyframes drive-loop {
            0% { transform: translate(0, -50%); }
            100% { transform: translate(-60px, -50%); }
        }

        /* Animated Vehicle Container */
        .animated-car {
            position: absolute;
            bottom: 15px;
            left: 35%;
            width: 130px;
            height: 65px;
            cursor: pointer;
            transition: transform 0.05s ease;
            animation: car-bounce 0.15s infinite alternate;
        }

        .animated-car:active {
            transform: scale(0.95) !important;
        }

        @keyframes car-bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-2px); }
        }

        /* Dynamic Car CSS Styling via classes */
        .car-body {
            position: absolute;
            bottom: 15px;
            width: 120px;
            height: 30px;
            background-color: #e74c3c;
            border-radius: 5px 20px 5px 5px;
            transition: background-color 0.3s;
        }

        .car-cabin {
            position: absolute;
            bottom: 42px;
            left: 25px;
            width: 60px;
            height: 25px;
            background-color: #e74c3c;
            border-radius: 15px 15px 0 0;
            transition: background-color 0.3s;
        }

        .car-cabin::before {
            content: ''; position: absolute; top: 4px; left: 8px; width: 20px; height: 18px;
            background-color: #a4b0be; border-radius: 5px 2px 0 0;
        }

        .wheel {
            position: absolute; bottom: 3px; width: 24px; height: 24px;
            background-color: #111; border: 3px solid #747d8c; border-radius: 50%;
            animation: spin 0.2s linear infinite;
        }
        .w-left { left: 15px; }
        .w-right { right: 30px; }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* Theme variants for bought cars */
        .tier-sedan .car-body, .tier-sedan .car-cabin { background-color: #3498db; }
        .tier-pickup .car-body { background-color: #f1c40f; border-radius: 5px 5px 5px 5px; width: 125px;}
        .tier-pickup .car-cabin { background-color: #f1c40f; width: 40px; left: 15px; border-radius: 10px 5px 0 0;}
        .tier-sport .car-body { background-color: #9b59b6; height: 22px; border-radius: 5px 30px 5px 5px; }
        .tier-sport .car-cabin { background-color: #9b59b6; height: 20px; bottom: 34px; left: 30px; }
        .tier-super .car-body { background-color: #e67e22; height: 18px; border-radius: 2px 40px 5px 2px; }
        .tier-super .car-cabin { background-color: #e67e22; height: 18px; bottom: 30px; left: 35px; width: 50px; }

        /* Right Side: Dealership Shop */
        .shop-section {
            padding: 30
